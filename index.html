<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Design Construction — Operations Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root{
  --navy:#0B2C4D;
  --navy-2:#123A63;
  --navy-deep:#081F38;
  --charcoal:#262B33;
  --muted:#6B7280;
  --line:#E4E8EE;
  --panel:#F5F7FA;
  --white:#FFFFFF;

  --c-dashboard:#1B5A8A;
  --c-customers:#0E7C7B;
  --c-projects:#B8842B;
  --c-quotations:#6B4FA0;
  --c-invoices:#2E8B57;
  --c-finance:#0B2C4D;
  --c-materials:#C1592B;
  --c-staff:#4A5A7A;
  --c-calendar:#A33B3B;
  --c-documents:#5B6472;

  --radius:14px;
  --radius-sm:9px;
  --shadow-sm: 0 1px 2px rgba(11,44,77,0.06), 0 1px 1px rgba(11,44,77,0.04);
  --shadow-md: 0 8px 24px rgba(11,44,77,0.08), 0 2px 6px rgba(11,44,77,0.05);
  --shadow-lg: 0 20px 48px rgba(8,31,56,0.16);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--charcoal);
  background:var(--panel);
  -webkit-font-smoothing:antialiased;
}
#root{height:100%;}
h1,h2,h3,.display{ font-family:'Fraunces',serif; font-weight:600; letter-spacing:-0.01em; }
.mono{ font-family:'IBM Plex Mono',monospace; }
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#C7D0DC;border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

.app-shell{ display:flex; min-height:100vh; }

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:260px; flex-shrink:0;
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  color:#EAF1F8;
  display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh;
  z-index:40;
}
.sidebar-brand{
  padding:26px 22px 20px 22px;
  position:relative;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:14px 14px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.sidebar-brand .mark{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#3E7FB0,#0B2C4D);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif; font-weight:700; font-size:18px; color:#fff;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
  margin-bottom:12px;
}
.sidebar-brand .name{ font-family:'Fraunces',serif; font-size:17px; font-weight:600; line-height:1.25; color:#fff;}
.sidebar-brand .sub{ font-size:10.5px; letter-spacing:0.12em; text-transform:uppercase; color:#9FB6CC; margin-top:4px;}
.nav{ padding:14px 12px; flex:1; overflow-y:auto; }
.nav-item{
  display:flex; align-items:center; gap:11px;
  padding:10px 12px; border-radius:10px; margin-bottom:3px;
  cursor:pointer; color:#C6D7E8; font-size:13.5px; font-weight:500;
  transition:background .15s ease, color .15s ease;
  user-select:none;
}
.nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
.nav-item.active{ background:rgba(255,255,255,0.12); color:#fff; box-shadow: inset 3px 0 0 var(--dot,#5FA8E0); }
.nav-item .dot{ width:8px;height:8px;border-radius:50%; background:var(--dot,#5FA8E0); flex-shrink:0; }
.sidebar-foot{ padding:16px 22px; border-top:1px solid rgba(255,255,255,0.08); font-size:11px; color:#7E97AF; }

/* ---------- MAIN ---------- */
.main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 30px; background:#fff; border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:30;
}
.topbar h1{ font-size:22px; margin:0; color:var(--navy); }
.topbar .accent-bar{ width:34px; height:4px; border-radius:3px; background:var(--accent, var(--c-dashboard)); margin-top:6px; }
.content{ padding:26px 30px 60px 30px; flex:1; }

.btn{
  border:none; cursor:pointer; font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
  padding:9px 16px; border-radius:9px; display:inline-flex; align-items:center; gap:7px;
  transition: transform .1s ease, box-shadow .15s ease, opacity .15s ease;
}
.btn:active{ transform:translateY(1px); }
.btn-primary{ background:var(--accent,var(--navy)); color:#fff; box-shadow:var(--shadow-sm); }
.btn-primary:hover{ box-shadow:var(--shadow-md); }
.btn-ghost{ background:#fff; color:var(--charcoal); border:1px solid var(--line); }
.btn-ghost:hover{ background:var(--panel); }
.btn-danger{ background:#fff; color:#B3261E; border:1px solid #F2C9C6; }
.btn-danger:hover{ background:#FDF3F2; }
.btn-sm{ padding:6px 11px; font-size:12px; border-radius:7px; }

.toolbar{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
.search-wrap{ position:relative; flex:1; min-width:220px; max-width:360px; }
.search-wrap input{
  width:100%; padding:9px 12px 9px 34px; border-radius:9px; border:1px solid var(--line);
  font-size:13px; background:#fff; outline:none;
}
.search-wrap input:focus{ border-color:var(--accent,var(--navy)); box-shadow:0 0 0 3px rgba(11,44,77,0.08); }
.search-wrap svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); color:#9AA5B1; }
.actions-right{ display:flex; gap:10px; align-items:center; }

/* CARDS */
.card{ background:#fff; border-radius:var(--radius); box-shadow:var(--shadow-sm); border:1px solid var(--line); }
.card-pad{ padding:20px; }

.kpi-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:22px; }
.kpi{ background:#fff; border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow-sm); border:1px solid var(--line); border-top:3px solid var(--accent,var(--navy)); }
.kpi .label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600; }
.kpi .value{ font-family:'Fraunces',serif; font-size:26px; font-weight:600; margin-top:6px; color:var(--charcoal); }
.kpi .foot{ font-size:11.5px; color:var(--muted); margin-top:4px; }

.section-grid{ display:grid; grid-template-columns: 1.4fr 1fr; gap:18px; margin-bottom:20px; }
.dash-block{ background:#fff; border-radius:var(--radius); border:1px solid var(--line); box-shadow:var(--shadow-sm); padding:20px; }
.dash-block h3{ margin:0 0 14px 0; font-size:15px; color:var(--navy); display:flex; align-items:center; justify-content:space-between; }

table{ width:100%; border-collapse:collapse; font-size:13px; }
th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; padding:9px 12px; border-bottom:1px solid var(--line); }
td{ padding:11px 12px; border-bottom:1px solid #EEF1F5; vertical-align:middle; }
tr:last-child td{ border-bottom:none; }
tr.clickable{ cursor:pointer; }
tr.clickable:hover td{ background:#FAFBFD; }

.stamp{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px 3px 10px; border-radius:20px; border:1.5px dashed currentColor;
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.06em;
  transform:rotate(-1.2deg);
}
.stamp::before{ content:'●'; font-size:8px; }

.pill{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }

.empty-state{ text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state .icon{ font-size:34px; margin-bottom:10px; }

/* MODAL */
.modal-overlay{ position:fixed; inset:0; background:rgba(8,31,56,0.45); display:flex; align-items:flex-start; justify-content:center; z-index:100; padding:40px 20px; overflow-y:auto; }
.modal{ background:#fff; border-radius:16px; width:100%; max-width:640px; box-shadow:var(--shadow-lg); animation:pop .16s ease; }
.modal.wide{ max-width:880px; }
@keyframes pop{ from{ opacity:0; transform:translateY(8px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);} }
.modal-head{ display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(--line); }
.modal-head h2{ margin:0; font-size:18px; color:var(--navy); }
.modal-body{ padding:22px 24px; max-height:70vh; overflow-y:auto; }
.modal-foot{ padding:16px 24px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px; }
.modal-close{ background:none; border:none; cursor:pointer; color:var(--muted); font-size:20px; line-height:1; }

.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-field{ display:flex; flex-direction:column; gap:6px; margin-bottom:2px;}
.form-field.full{ grid-column:1 / -1; }
.form-field label{ font-size:12px; font-weight:600; color:var(--muted); }
.form-field input, .form-field select, .form-field textarea{
  padding:9px 11px; border-radius:8px; border:1px solid var(--line); font-size:13.5px; font-family:'Inter',sans-serif; outline:none; background:#fff;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus{ border-color:var(--accent,var(--navy)); box-shadow:0 0 0 3px rgba(11,44,77,0.08); }
.form-field textarea{ resize:vertical; min-height:70px; }

.line-item-row{ display:grid; grid-template-columns: 2.2fr 0.7fr 1fr 1fr 32px; gap:8px; align-items:center; margin-bottom:8px; }
.line-item-head{ display:grid; grid-template-columns: 2.2fr 0.7fr 1fr 1fr 32px; gap:8px; font-size:11px; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:6px; }
.icon-btn{ width:30px;height:30px; border-radius:7px; border:1px solid var(--line); background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#B3261E; }
.icon-btn:hover{ background:#FDF3F2; }

.tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:18px; }
.tab{ padding:9px 16px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
.tab.active{ color:var(--accent,var(--navy)); border-bottom-color:var(--accent,var(--navy)); }

.detail-header{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; flex-wrap:wrap; gap:14px;}
.detail-title h2{ margin:0 0 6px 0; font-size:24px; color:var(--navy); }
.detail-meta{ display:flex; gap:16px; flex-wrap:wrap; color:var(--muted); font-size:13px; }
.back-link{ display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; cursor:pointer; margin-bottom:14px; font-weight:600; }
.back-link:hover{ color:var(--navy); }

.progress-track{ height:8px; border-radius:6px; background:#EAEDF2; overflow:hidden; }
.progress-fill{ height:100%; border-radius:6px; background:var(--accent, var(--navy)); }

.toast{ position:fixed; bottom:24px; right:24px; background:var(--navy); color:#fff; padding:12px 18px; border-radius:10px; box-shadow:var(--shadow-lg); font-size:13.5px; font-weight:500; z-index:200; display:flex; align-items:center; gap:10px; animation:pop .18s ease; }

.quick-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
.qa-btn{ background:#fff; border:1px solid var(--line); border-radius:11px; padding:10px 16px; cursor:pointer; font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; color:var(--charcoal); box-shadow:var(--shadow-sm); }
.qa-btn:hover{ box-shadow:var(--shadow-md); transform:translateY(-1px); }
.qa-btn .sq{ width:26px;height:26px;border-radius:7px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; flex-shrink:0;}

.chip{ display:inline-flex; align-items:center; gap:5px; background:var(--panel); border-radius:20px; padding:4px 10px; font-size:11.5px; font-weight:600; color:var(--charcoal); }

.avatar{ width:34px;height:34px;border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; }

.material-row{ display:grid; grid-template-columns: 1.6fr repeat(5,0.8fr) 60px; gap:8px; align-items:center; font-size:12.5px; }
.material-row input{ width:100%; padding:6px 8px; border-radius:6px; border:1px solid var(--line); font-size:12.5px; }
.material-head{ display:grid; grid-template-columns: 1.6fr repeat(5,0.8fr) 60px; gap:8px; font-size:10.5px; text-transform:uppercase; color:var(--muted); font-weight:700; padding-bottom:6px; border-bottom:1px solid var(--line); margin-bottom:8px;}

@media (max-width:980px){
  .kpi-grid{ grid-template-columns:repeat(2,1fr); }
  .section-grid{ grid-template-columns:1fr; }
  .form-grid{ grid-template-columns:1fr; }
}
@media (max-width:760px){
  .sidebar{ position:fixed; left:-280px; transition:left .2s ease; box-shadow:var(--shadow-lg); }
  .sidebar.open{ left:0; }
  .kpi-grid{ grid-template-columns:1fr 1fr; }
  .content{ padding:18px; }
  .topbar{ padding:14px 16px; }
  .menu-btn{ display:flex !important; }
}
.menu-btn{ display:none; background:none; border:none; cursor:pointer; color:var(--navy); }

@media print{
  .sidebar, .topbar, .toolbar, .no-print{ display:none !important; }
  .content{ padding:0; }
}
</style>
</head>

/* ============================= HELPERS ============================= */
let _id = 1000;
const uid = (p) => `${p}-${_id++}`;
const money = (n) => "R " + (Number(n)||0).toLocaleString('en-ZA', {minimumFractionDigits:2, maximumFractionDigits:2});
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = (d) => d ? new Date(d+"T00:00:00").toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : "—";
const initials = (name="") => name.split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase();
const colorFromString = (s="") => {
  const palette = ["#0E7C7B","#B8842B","#6B4FA0","#2E8B57","#4A5A7A","#A33B3B","#1B5A8A","#C1592B"];
  let h=0; for(let i=0;i<s.length;i++) h = s.charCodeAt(i)+((h<<5)-h);
  return palette[Math.abs(h)%palette.length];
};

const lineItemsTotal = (items=[]) => items.reduce((s,i)=> s + (Number(i.qty)||0)*(Number(i.unitPrice)||0), 0);
const calcDocTotal = (items, discount=0, vat=15) => {
  const sub = lineItemsTotal(items);
  const afterDiscount = sub - (sub * (Number(discount)||0)/100);
  const vatAmt = afterDiscount * (Number(vat)||0)/100;
  return { sub, afterDiscount, vatAmt, total: afterDiscount + vatAmt };
};
const invoicePaid = (inv) => (inv.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0);
const invoiceBalance = (inv) => {
  const {total} = calcDocTotal(inv.items, inv.discount, inv.vat);
  return Math.max(0, total - invoicePaid(inv));
};

/* ============================= APP CONTEXT ============================= */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ============================= GENERIC UI ============================= */
function Modal({title, onClose, children, wide, footer}) {
  return (
    <div className="modal-overlay" onMouseDown={(e)=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className={"modal" + (wide?" wide":"")}>
        <div className="modal-head">
          <h2>{title}</h2>
          <button className="modal-close" onClick={onClose}><Icon d={ICONS.x} size={20}/></button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

function Field({label, children, full}) {
  return <div className={"form-field" + (full?" full":"")}><label>{label}</label>{children}</div>;
}

function GenericForm({schema, value, onChange}) {
  const set = (k,v) => onChange({...value, [k]:v});
  return (
    <div className="form-grid">
      {schema.map(f => (
        <Field key={f.name} label={f.label} full={f.full}>
          {f.type==="select" ? (
            <select value={value[f.name] ?? ""} onChange={e=>set(f.name, e.target.value)}>
              <option value="">{f.placeholder||"Select..."}</option>
              {f.options.map(o => <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>)}
            </select>
          ) : f.type==="textarea" ? (
            <textarea value={value[f.name] ?? ""} onChange={e=>set(f.name, e.target.value)} placeholder={f.placeholder}/>
          ) : (
            <input type={f.type||"text"} value={value[f.name] ?? ""} onChange={e=>set(f.name, f.type==="number" ? e.target.value : e.target.value)} placeholder={f.placeholder}/>
          )}
        </Field>
      ))}
    </div>
  );
}

function StatusPill({status}) {
  const colors = {
    "In Progress":"#B8842B","Planned":"#4A5A7A","Completed":"#2E8B57","On Hold":"#A33B3B",
    "Sent":"#6B4FA0","Draft":"#8A93A3","Accepted":"#2E8B57","Declined":"#A33B3B","Converted":"#1B5A8A",
    "Paid":"#2E8B57","Partially Paid":"#B8842B","Unpaid":"#A33B3B","Overdue":"#A33B3B",
    "On Site":"#2E8B57","Available":"#1B5A8A","Off":"#8A93A3",
    "Delivered":"#2E8B57","Partial":"#B8842B","Outstanding":"#A33B3B",
  };
  const c = colors[status] || "#4A5A7A";
  return <span className="pill" style={{background:c+"1A", color:c}}>{status}</span>;
}

function Toast({msg, onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone, 2400); return ()=>clearTimeout(t); },[]);
  return <div className="toast"><Icon d={ICONS.check} size={16}/> {msg}</div>;
}

function ConfirmFooter({onCancel, onConfirm, confirmLabel="Save", danger}) {
  return <>
    <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
    <button className={"btn " + (danger?"btn-danger":"btn-primary")} onClick={onConfirm}>{confirmLabel}</button>
  </>;
}

function Toolbar({search, setSearch, placeholder, right}) {
  return (
    <div className="toolbar">
      <div className="search-wrap">
        <Icon d={ICONS.search} size={15}/>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={placeholder||"Search..."}/>
      </div>
      <div className="actions-right">{right}</div>
    </div>
  );
}

function EmptyState({icon, title, sub}) {
  return <div className="empty-state"><div className="icon">{icon}</div><div style={{fontWeight:700, color:'#3a3f47', marginBottom:4}}>{title}</div><div style={{fontSize:13}}>{sub}</div></div>;
}

/* ============================= LINE ITEMS EDITOR ============================= */
function LineItemsEditor({items, setItems}) {
  const update = (id, patch) => setItems(items.map(i => i.id===id ? {...i, ...patch} : i));
  const remove = (id) => setItems(items.filter(i=>i.id!==id));
  const add = () => setItems([...items, {id:uid('li'), desc:"", type:"Labour", qty:1, unitPrice:0}]);
  return (
    <div>
      <div className="line-item-head"><span>Description</span><span>Type</span><span>Qty</span><span>Unit Price</span><span></span></div>
      {items.map(it => (
        <div className="line-item-row" key={it.id}>
          <input value={it.desc} onChange={e=>update(it.id,{desc:e.target.value})} placeholder="e.g. Brickwork labour"/>
          <select value={it.type} onChange={e=>update(it.id,{type:e.target.value})}>
            <option>Labour</option><option>Material</option>
          </select>
          <input type="number" value={it.qty} onChange={e=>update(it.id,{qty:e.target.value})}/>
          <input type="number" value={it.unitPrice} onChange={e=>update(it.id,{unitPrice:e.target.value})}/>
          <button className="icon-btn" onClick={()=>remove(it.id)}><Icon d={ICONS.trash} size={14}/></button>
        </div>
      ))}
      <button className="btn btn-ghost btn-sm" onClick={add}><Icon d={ICONS.plus} size={13}/> Add line item</button>
    </div>
  );
}

function TotalsBox({items, discount, setDiscount, vat, setVat}) {
  const {sub, afterDiscount, vatAmt, total} = calcDocTotal(items, discount, vat);
  return (
    <div className="card card-pad" style={{marginTop:16, background:'#F9FAFC'}}>
      <div className="form-grid" style={{marginBottom:10}}>
        <Field label="Discount (%)"><input type="number" value={discount} onChange={e=>setDiscount(e.target.value)}/></Field>
        <Field label="VAT (%)"><input type="number" value={vat} onChange={e=>setVat(e.target.value)}/></Field>
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:6, fontSize:13.5}}>
        <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'var(--muted)'}}>Subtotal</span><span>{money(sub)}</span></div>
        <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'var(--muted)'}}>After discount</span><span>{money(afterDiscount)}</span></div>
        <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'var(--muted)'}}>VAT</span><span>{money(vatAmt)}</span></div>
        <div style={{display:'flex', justifyContent:'space-between', fontWeight:700, fontSize:16, borderTop:'1px solid var(--line)', paddingTop:8, marginTop:2}}><span>Total</span><span>{money(total)}</span></div>
      </div>
    </div>
  );
}

function Dashboard({navigate}) {
  const {state} = useApp();

  const totalInvoiced = invoices.reduce((s,i)=> s + calcDocTotal(i.items,i.discount,i.vat).total, 0);
  const totalPaid = invoices.reduce((s,i)=> s + invoicePaid(i), 0);
  const outstanding = invoices.reduce((s,i)=> s + invoiceBalance(i), 0);
  const totalExpenses = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const cashflow = totalPaid - totalExpenses;
  const activeCustomers = customers.filter(c=>!c.archived).length;
  const activeProjects = projects.filter(p=>p.status==="In Progress").length;
  const plannedProjects = projects.filter(p=>p.status==="Planned").length;

  const materialsAttention = [];
  projects.forEach(p => (p.materials||[]).forEach(m => {
    const remainToOrder = Math.max(0,(m.required||0)-(m.ordered||0));
    const remainOnSite = Math.max(0,(m.delivered||0)-(m.used||0));
    if (remainToOrder>0 || (m.required>0 && remainOnSite < (m.required*0.1) && m.used < m.required)) {
      materialsAttention.push({project:p.name, material:m.name, remainToOrder, remainOnSite});
    }
  }));

  const upcoming = [...calendarEvents].filter(e=>e.date>=todayISO()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const recentActivity = useMemo(()=>{
    const acts = [];
    invoices.forEach(i=> (i.payments||[]).forEach(p=> acts.push({date:p.date, text:`Payment of ${money(p.amount)} received for ${i.number}`, type:'invoices'})));
    projects.forEach(p=> acts.push({date:p.startDate, text:`Project "${p.name}" started`, type:'projects'}));
    quotations.forEach(q=> acts.push({date:q.createdAt, text:`Quotation ${q.number} created`, type:'quotations'}));

      </div>

      <div className="kpi-grid">
        {kpis.map(k=> (
          <div className="kpi" key={k.label} style={{'--accent':k.accent}}>
            <div className="label">{k.label}</div>

      <div className="section-grid">
        <div className="dash-block">

          <table>

function Customers({navigate, params}) {
  const {state, actions} = useApp();
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [detailId, setDetailId] = useState(params?.detailId || null);
  const [showArchived, setShowArchived] = useState(false);

  useEffect(()=>{ if(params?.openNew) openNew(); if(params?.detailId) setDetailId(params.detailId); }, [params]);

  const openNew = () => { setForm({}); setEditing('new'); };
  const openEdit = (c) => { setForm(c); setEditing(c.id); };
  const save = () => {
    if(!form.name){ alert("Customer name is required."); return; }
    if(editing==='new') actions.addCustomer({...form, id:uid('cust'), createdAt:todayISO(), archived:false});
    else actions.updateCustomer(editing, form);
    setEditing(null);
  };

  const list = state.customers.filter(c => (showArchived ? c.archived : !c.archived))
    .filter(c => (c.name+c.email+c.phone).toLowerCase().includes(search.toLowerCase()));

  if (detailId) {
    const cust = state.customers.find(c=>c.id===detailId);
    if(!cust) { setDetailId(null); return null; }
    const projects = state.projects.filter(p=>p.customerId===cust.id);
    const quotes = state.quotations.filter(q=>q.customerId===cust.id);
    const invs = state.invoices.filter(i=>i.customerId===cust.id);
    const docs = state.documents.filter(d=>projects.some(p=>p.name===d.relatedTo));
    return (
      <div>
        <div className="back-link" onClick={()=>setDetailId(null)}><Icon d={ICONS.chevronLeft} size={15}/> Back to customers</div>
        <div className="detail-header">
          <div className="detail-title">
            <h2>{cust.name}</h2>
            <div className="detail-meta">
              <span>{cust.phone}</span><span>{cust.email}</span><span>{cust.address}</span>
            </div>
          </div>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-ghost" onClick={()=>openEdit(cust)}><Icon d={ICONS.edit} size={14}/> Edit</button>
            <button className="btn btn-danger" onClick={()=>{ if(confirm('Delete this customer?')){ actions.deleteCustomer(cust.id); setDetailId(null);} }}><Icon d={ICONS.trash} size={14}/> Delete</button>
          </div>
        </div>
        {cust.notes && <div className="card card-pad" style={{marginBottom:18}}><b>Notes:</b> {cust.notes}</div>}
        <div className="section-grid">
          <div className="dash-block">
            <h3>Projects ({projects.length})</h3>
            {projects.length===0 ? <EmptyState icon="🏗️" title="No projects yet" sub="Create a project for this customer."/> :
            projects.map(p=>(
              <div key={p.id} className="chip" style={{marginRight:8, marginBottom:8, cursor:'pointer'}} onClick={()=>navigate('projects',{detailId:p.id})}>{p.name} · <StatusPill status={p.status}/></div>
            ))}
          </div>
          <div className="dash-block">
            <h3>Quotations & Invoices</h3>
            <div style={{fontSize:13, marginBottom:8, fontWeight:700, color:'var(--muted)'}}>QUOTATIONS</div>
            {quotes.length===0 ? <div style={{fontSize:13, color:'var(--muted)', marginBottom:10}}>None yet.</div> :
            quotes.map(q=><div key={q.id} className="chip" style={{marginRight:8, marginBottom:8, cursor:'pointer'}} onClick={()=>navigate('quotations',{detailId:q.id})}>{q.number} · {money(calcDocTotal(q.items,q.discount,q.vat).total)}</div>)}
            <div style={{fontSize:13, margin:'10px 0 8px', fontWeight:700, color:'var(--muted)'}}>INVOICES / PAYMENTS</div>
            {invs.length===0 ? <div style={{fontSize:13, color:'var(--muted)'}}>None yet.</div> :
            invs.map(i=><div key={i.id} className="chip" style={{marginRight:8, marginBottom:8, cursor:'pointer'}} onClick={()=>navigate('invoices',{detailId:i.id})}>{i.number} · Paid {money(invoicePaid(i))} / {money(calcDocTotal(i.items,i.discount,i.vat).total)}</div>)}
          </div>
        </div>
        <div className="dash-block" style={{marginTop:18}}>
          <h3>Documents</h3>
          {docs.length===0 ? <EmptyState icon="📄" title="No documents linked" sub="Documents linked to this customer's projects appear here."/> :
          docs.map(d=><div key={d.id} className="chip" style={{marginRight:8, marginBottom:8}}>{d.name}</div>)}
        </div>
        {editing && (
          <Modal title={editing==='new'?"New Customer":"Edit Customer"} onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Customer"/>}>
            <GenericForm schema={custSchema} value={form} onChange={setForm}/>
          </Modal>
        )}
      </div>
    );
  }

  return (
    <div>
      <Toolbar search={search} setSearch={setSearch} placeholder="Search customers..." right={<>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowArchived(s=>!s)}>{showArchived?"Show Active":"Show Archived"}</button>
        <button className="btn btn-primary" style={{'--accent':'var(--c-customers)'}} onClick={openNew}><Icon d={ICONS.plus} size={14}/> New Customer</button>
      </>}/>
      <div className="card">
        {list.length===0 ? <EmptyState icon="👤" title="No customers found" sub="Add your first customer to get started."/> :
        <table>
          <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Projects</th><th>Outstanding</th><th></th></tr></thead>
          <tbody>
            {list.map(c=>{
              const projCount = state.projects.filter(p=>p.customerId===c.id).length;
              const outstanding = state.invoices.filter(i=>i.customerId===c.id).reduce((s,i)=>s+invoiceBalance(i),0);
              return (
                <tr key={c.id} className="clickable" onClick={()=>setDetailId(c.id)}>
                  <td style={{fontWeight:600, display:'flex', alignItems:'center', gap:10}}>
                    <div className="avatar" style={{background:colorFromString(c.name), width:28,height:28,fontSize:11}}>{initials(c.name)}</div>{c.name}
                  </td>
                  <td>{c.phone}</td><td>{c.email}</td><td>{projCount}</td>
                  <td style={{color: outstanding>0 ? '#A33B3B':'var(--charcoal)', fontWeight:600}}>{money(outstanding)}</td>
                  <td onClick={e=>e.stopPropagation()} style={{display:'flex', gap:6, justifyContent:'flex-end'}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(c)}><Icon d={ICONS.edit} size={13}/></button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>actions.updateCustomer(c.id,{archived:!c.archived})}><Icon d={ICONS.archive} size={13}/></button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>}
      </div>
      {editing && (
        <Modal title={editing==='new'?"New Customer":"Edit Customer"} onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Customer"/>}>
          <GenericForm schema={custSchema} value={form} onChange={setForm}/>
        </Modal>
      )}
    </div>
  );
}

/* ============================= PROJECTS ============================= */
function ProjectForm({form, setForm, customers}) {
  const schema = [
    {name:'name', label:'Project Name', full:true},
    {name:'customerId', label:'Customer', type:'select', options:customers.map(c=>({value:c.id,label:c.name}))},
    {name:'status', label:'Status', type:'select', options:['Planned','In Progress','On Hold','Completed']},
    {name:'siteAddress', label:'Site Address', full:true},
    {name:'startDate', label:'Start Date', type:'date'},
    {name:'completionDate', label:'Completion Date', type:'date'},
    {name:'budget', label:'Budget (R)', type:'number'},
    {name:'progress', label:'Progress (%)', type:'number'},
    {name:'notes', label:'Notes', full:true, type:'textarea'},
  ];
  return <GenericForm schema={schema} value={form} onChange={setForm}/>;
}

function ProjectDetail({project, onBack, navigate}) {
  const {state, actions} = useApp();
  const [tab, setTab] = useState('overview');
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState(project);
  const cust = state.customers.find(c=>c.id===project.customerId);
  const quotes = state.quotations.filter(q=>q.projectId===project.id);
  const invs = state.invoices.filter(i=>i.projectId===project.id);
  const expenses = state.expenses.filter(e=>e.projectId===project.id);
  const staffOnProject = state.staff.filter(s=>s.currentProjectId===project.id);

  const invoicedTotal = invs.reduce((s,i)=>s+calcDocTotal(i.items,i.discount,i.vat).total,0);
  const paidTotal = invs.reduce((s,i)=>s+invoicePaid(i),0);
  const materialCost = (project.materials||[]).reduce((s,m)=>s+(m.used||0)*(m.cost||0),0);
  const laborExpenses = expenses.filter(e=>e.category==='Labour').reduce((s,e)=>s+Number(e.amount),0);
  const totalExpenses = expenses.reduce((s,e)=>s+Number(e.amount),0);
  const profit = paidTotal - totalExpenses;

  const [newTask, setNewTask] = useState("");
  const [newMs, setNewMs] = useState({title:"", date:""});

  const saveProject = () => { actions.updateProject(project.id, form); setEditing(false); };

  const addMaterialRow = () => {
    actions.updateProject(project.id, {materials:[...(project.materials||[]), {id:uid('pm'), catalogueId:null, name:"New Material", unit:"unit", cost:0, required:0, ordered:0, delivered:0, used:0}]});
  };
  const updateMaterialRow = (mid, patch) => {
    actions.updateProject(project.id, {materials: project.materials.map(m=>m.id===mid?{...m,...patch}:m)});
  };
  const removeMaterialRow = (mid) => {
    actions.updateProject(project.id, {materials: project.materials.filter(m=>m.id!==mid)});
  };

  return (
    <div>
      <div className="back-link" onClick={onBack}><Icon d={ICONS.chevronLeft} size={15}/> Back to projects</div>
      <div className="detail-header">
        <div className="detail-title">
          <h2>{project.name}</h2>
          <div className="detail-meta">
            <span><Icon d={ICONS.customers} size={13}/> {cust?.name||"—"}</span>
            <span><Icon d={ICONS.pin} size={13}/> {project.siteAddress}</span>
            <span><Icon d={ICONS.calendar} size={13}/> {fmtDate(project.startDate)} → {fmtDate(project.completionDate)}</span>
            <StatusPill status={project.status}/>
          </div>
        </div>
        <div style={{display:'flex', gap:8}}>
          <button className="btn btn-ghost" onClick={()=>{setForm(project); setEditing(true);}}><Icon d={ICONS.edit} size={14}/> Edit</button>
          <button className="btn btn-danger" onClick={()=>{ if(confirm('Delete this project?')){ actions.deleteProject(project.id); onBack(); } }}><Icon d={ICONS.trash} size={14}/> Delete</button>
        </div>
      </div>

      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="kpi" style={{'--accent':'var(--c-projects)'}}><div className="label">Budget</div><div className="value">{money(project.budget)}</div></div>
        <div className="kpi" style={{'--accent':'var(--c-invoices)'}}><div className="label">Invoiced</div><div className="value">{money(invoicedTotal)}</div></div>
        <div className="kpi" style={{'--accent':'var(--c-finance)'}}><div className="label">Collected</div><div className="value">{money(paidTotal)}</div></div>
        <div className="kpi" style={{'--accent': profit>=0 ? 'var(--c-invoices)':'var(--c-calendar)'}}><div className="label">Profit (to date)</div><div className="value">{money(profit)}</div></div>
      </div>

      <div style={{marginBottom:16}}>
        <div style={{fontSize:12.5, color:'var(--muted)', marginBottom:6, display:'flex', justifyContent:'space-between'}}><span>Progress</span><span>{project.progress}%</span></div>
        <div className="progress-track" style={{height:10}}><div className="progress-fill" style={{width:project.progress+'%', background:'var(--c-projects)'}}/></div>
      </div>

      <div className="tabs" style={{'--accent':'var(--c-projects)'}}>
        {['overview','tasks','materials','financial','documents'].map(t=>(
          <div key={t} className={"tab"+(tab===t?" active":"")} style={{'--accent':'var(--c-projects)'}} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</div>
        ))}
      </div>

      {tab==='overview' && (
        <div className="section-grid">
          <div className="dash-block">
            <h3>Milestones</h3>
            {(project.milestones||[]).length===0 ? <EmptyState icon="🚩" title="No milestones" sub="Add key milestones to track progress."/> :
            project.milestones.map(m=>(
              <div key={m.id} style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
                <input type="checkbox" checked={m.done} onChange={()=>actions.updateProject(project.id,{milestones:project.milestones.map(x=>x.id===m.id?{...x,done:!x.done}:x)})}/>
                <div style={{flex:1, textDecoration:m.done?'line-through':'none', color:m.done?'var(--muted)':'inherit'}}>{m.title}</div>
                <div style={{fontSize:11.5, color:'var(--muted)'}}>{fmtDate(m.date)}</div>
              </div>
            ))}
            <div style={{display:'flex', gap:8, marginTop:10}}>
              <input placeholder="New milestone" value={newMs.title} onChange={e=>setNewMs({...newMs,title:e.target.value})} style={{flex:1, padding:'7px 10px', borderRadius:7, border:'1px solid var(--line)'}}/>
              <input type="date" value={newMs.date} onChange={e=>setNewMs({...newMs,date:e.target.value})} style={{padding:'7px 10px', borderRadius:7, border:'1px solid var(--line)'}}/>
              <button className="btn btn-ghost btn-sm" onClick={()=>{ if(!newMs.title)return; actions.updateProject(project.id,{milestones:[...(project.milestones||[]),{id:uid('ms'),...newMs,done:false}]}); setNewMs({title:"",date:""}); }}>Add</button>
            </div>
          </div>
          <div className="dash-block">
            <h3>Staff Assigned</h3>
            {staffOnProject.length===0 ? <EmptyState icon="👷" title="No staff assigned" sub="Assign staff from the Staff module."/> :
            staffOnProject.map(s=>(
              <div key={s.id} style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
                <div className="avatar" style={{background:colorFromString(s.name), width:30,height:30,fontSize:12}}>{initials(s.name)}</div>
                <div><div style={{fontWeight:600, fontSize:13}}>{s.name}</div><div style={{fontSize:11.5,color:'var(--muted)'}}>{s.trade}</div></div>
              </div>
            ))}
            <h3 style={{marginTop:20}}>Notes</h3>
            <div style={{fontSize:13, color:'var(--charcoal)'}}>{project.notes || "No notes recorded."}</div>
          </div>
        </div>
      )}

      {tab==='tasks' && (
        <div className="dash-block">
          <h3>Tasks</h3>
          {(project.tasks||[]).length===0 ? <EmptyState icon="✅" title="No tasks yet" sub="Break the project down into tasks."/> :
          project.tasks.map(t=>(
            <div key={t.id} style={{display:'flex', alignItems:'center', gap:10, marginBottom:8, padding:'8px 0', borderBottom:'1px solid #EEF1F5'}}>
              <input type="checkbox" checked={t.done} onChange={()=>actions.updateProject(project.id,{tasks:project.tasks.map(x=>x.id===t.id?{...x,done:!x.done}:x)})}/>
              <div style={{flex:1, textDecoration:t.done?'line-through':'none', color:t.done?'var(--muted)':'inherit'}}>{t.title}</div>
              <button className="icon-btn" onClick={()=>actions.updateProject(project.id,{tasks:project.tasks.filter(x=>x.id!==t.id)})}><Icon d={ICONS.trash} size={13}/></button>
            </div>
          ))}
          <div style={{display:'flex', gap:8, marginTop:12}}>
            <input placeholder="New task" value={newTask} onChange={e=>setNewTask(e.target.value)} style={{flex:1, padding:'8px 10px', borderRadius:7, border:'1px solid var(--line)'}}/>
            <button className="btn btn-primary" style={{'--accent':'var(--c-projects)'}} onClick={()=>{ if(!newTask)return; actions.updateProject(project.id,{tasks:[...(project.tasks||[]),{id:uid('task'),title:newTask,done:false}]}); setNewTask(""); }}>Add Task</button>
          </div>
        </div>
      )}

      {tab==='materials' && (
        <div className="dash-block">
          <h3>Project Material Planner</h3>
          <div className="material-head">
            <span>Material</span><span>Unit</span><span>Required</span><span>Ordered</span><span>Delivered</span><span>Used</span><span></span>
          </div>
          {(project.materials||[]).map(m=>{
            const remainOnSite = Math.max(0,(m.delivered||0)-(m.used||0));
            const remainToOrder = Math.max(0,(m.required||0)-(m.ordered||0));
            return (
              <div key={m.id} style={{marginBottom:8, paddingBottom:8, borderBottom:'1px solid #F1F3F6'}}>
                <div className="material-row">
                  <input value={m.name} onChange={e=>updateMaterialRow(m.id,{name:e.target.value})}/>
                  <input value={m.unit} onChange={e=>updateMaterialRow(m.id,{unit:e.target.value})}/>
                  <input type="number" value={m.required} onChange={e=>updateMaterialRow(m.id,{required:Number(e.target.value)})}/>
                  <input type="number" value={m.ordered} onChange={e=>updateMaterialRow(m.id,{ordered:Number(e.target.value)})}/>
                  <input type="number" value={m.delivered} onChange={e=>updateMaterialRow(m.id,{delivered:Number(e.target.value)})}/>
                  <input type="number" value={m.used} onChange={e=>updateMaterialRow(m.id,{used:Number(e.target.value)})}/>
                  <button className="icon-btn" onClick={()=>removeMaterialRow(m.id)}><Icon d={ICONS.trash} size={13}/></button>
                </div>
                <div style={{display:'flex', gap:16, fontSize:11, color:'var(--muted)', marginTop:4, paddingLeft:2}}>
                  <span>Remaining on site: <b style={{color:'var(--charcoal)'}}>{remainOnSite} {m.unit}</b></span>
                  <span>Remaining to order: <b style={{color: remainToOrder>0?'#A33B3B':'var(--charcoal)'}}>{remainToOrder} {m.unit}</b></span>
                  <span>Cost to date: <b style={{color:'var(--charcoal)'}}>{money((m.used||0)*(m.cost||0))}</b></span>
                </div>
              </div>
            );
          })}
          <button className="btn btn-ghost btn-sm" onClick={addMaterialRow}><Icon d={ICONS.plus} size={13}/> Add material line</button>
          <div style={{marginTop:16, fontWeight:700}}>Total material cost (used): {money(materialCost)}</div>
        </div>
      )}

      {tab==='financial' && (
        <div>
          <div className="section-grid">
            <div className="dash-block">
              <h3>Quotations</h3>
              {quotes.length===0 ? <EmptyState icon="📝" title="No quotations" sub="Create a quotation for this project."/> :
              quotes.map(q=><div key={q.id} className="chip" style={{marginRight:8, marginBottom:8, cursor:'pointer'}} onClick={()=>navigate('quotations',{detailId:q.id})}>{q.number} · {money(calcDocTotal(q.items,q.discount,q.vat).total)} · <StatusPill status={q.status}/></div>)}
            </div>
            <div className="dash-block">
              <h3>Invoices</h3>
              {invs.length===0 ? <EmptyState icon="🧾" title="No invoices" sub="Convert a quotation or create an invoice."/> :
              invs.map(i=><div key={i.id} className="chip" style={{marginRight:8, marginBottom:8, cursor:'pointer'}} onClick={()=>navigate('invoices',{detailId:i.id})}>{i.number} · Balance {money(invoiceBalance(i))}</div>)}
            </div>
          </div>
          <div className="dash-block" style={{marginTop:18}}>
            <h3>Expenses</h3>
            {expenses.length===0 ? <EmptyState icon="💸" title="No expenses logged" sub="Log expenses from the Finance module."/> :
            <table><thead><tr><th>Description</th><th>Category</th><th>Date</th><th>Amount</th></tr></thead>
            <tbody>{expenses.map(e=><tr key={e.id}><td>{e.description}</td><td>{e.category}</td><td>{fmtDate(e.date)}</td><td>{money(e.amount)}</td></tr>)}</tbody></table>}
          </div>
        </div>
      )}

      {tab==='documents' && (
        <div className="dash-block">
          <h3>Documents</h3>
          {state.documents.filter(d=>d.relatedTo===project.name).length===0 ? <EmptyState icon="📄" title="No documents" sub="Upload documents from the Documents module."/> :
          state.documents.filter(d=>d.relatedTo===project.name).map(d=><div key={d.id} className="chip" style={{marginRight:8, marginBottom:8}}>{d.name}</div>)}
        </div>
      )}

      {editing && (
        <Modal title="Edit Project" wide onClose={()=>setEditing(false)} footer={<ConfirmFooter onCancel={()=>setEditing(false)} onConfirm={saveProject} confirmLabel="Save Project"/>}>
          <ProjectForm form={form} setForm={setForm} customers={state.customers}/>
        </Modal>
      )}
    </div>
  );
}

function Projects({navigate, params}) {
  const {state, actions} = useApp();
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [detailId, setDetailId] = useState(params?.detailId || null);

  useEffect(()=>{ if(params?.openNew) openNew(); if(params?.detailId) setDetailId(params.detailId); }, [params]);

  const openNew = () => { setForm({status:'Planned', progress:0, tasks:[], milestones:[], materials:[]}); setEditing('new'); };
  const openEdit = (p) => { setForm(p); setEditing(p.id); };
  const save = () => {
    if(!form.name || !form.customerId){ alert("Project name and customer are required."); return; }
    if(editing==='new') actions.addProject({...form, id:uid('proj'), tasks:form.tasks||[], milestones:form.milestones||[], materials:form.materials||[]});
    else actions.updateProject(editing, form);
    setEditing(null);
  };

  if (detailId) {
    const project = state.projects.find(p=>p.id===detailId);
    if(!project) { setDetailId(null); return null; }
    return <ProjectDetail project={project} onBack={()=>setDetailId(null)} navigate={navigate}/>;
  }

  const list = state.projects.filter(p=>!p.archived)
    .filter(p=> !statusFilter || p.status===statusFilter)
    .filter(p=> p.name.toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      <Toolbar search={search} setSearch={setSearch} placeholder="Search projects..." right={<>
        <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{padding:'8px 10px', borderRadius:8, border:'1px solid var(--line)', fontSize:13}}>
          <option value="">All statuses</option>
          <option>Planned</option><option>In Progress</option><option>On Hold</option><option>Completed</option>
        </select>
        <button className="btn btn-primary" style={{'--accent':'var(--c-projects)'}} onClick={openNew}><Icon d={ICONS.plus} size={14}/> New Project</button>
      </>}/>
      {list.length===0 ? <div className="card"><EmptyState icon="🏗️" title="No projects found" sub="Create your first project to get started."/></div> :
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px,1fr))', gap:16}}>
        {list.map(p=>{
          const cust = state.customers.find(c=>c.id===p.customerId);
          return (
            <div key={p.id} className="card card-pad" style={{cursor:'pointer', borderTop:'3px solid var(--c-projects)'}} onClick={()=>setDetailId(p.id)}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                <div style={{fontWeight:700, fontSize:15}}>{p.name}</div>
                <StatusPill status={p.status}/>
              </div>
              <div style={{fontSize:12.5, color:'var(--muted)', marginBottom:12}}>{cust?.name||"—"} · {p.siteAddress}</div>
              <div className="progress-track" style={{marginBottom:6}}><div className="progress-fill" style={{width:p.progress+'%', background:'var(--c-projects)'}}/></div>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:11.5, color:'var(--muted)'}}>
                <span>{p.progress}% complete</span><span>{money(p.budget)}</span>
              </div>
            </div>
          );
        })}
      </div>}
      {editing && (
        <Modal title={editing==='new'?"New Project":"Edit Project"} wide onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Project"/>}>
          <ProjectForm form={form} setForm={setForm} customers={state.customers}/>
        </Modal>
      )}
    </div>
  );
}

/* ============================= QUOTATIONS ============================= */
function Quotations({navigate, params}) {
  const {state, actions} = useApp();
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [detailId, setDetailId] = useState(params?.detailId || null);
  const [printing, setPrinting] = useState(null);

  useEffect(()=>{ if(params?.openNew) openNew(); if(params?.detailId) setDetailId(params.detailId); }, [params]);

  const openNew = () => { setForm({status:'Draft', discount:0, vat:15, items:[{id:uid('li'),desc:'',type:'Labour',qty:1,unitPrice:0}], createdAt:todayISO()}); setEditing('new'); };
  const openEdit = (q) => { setForm(q); setEditing(q.id); };
  const save = () => {
    if(!form.customerId){ alert("Please select a customer."); return; }
    if(editing==='new') actions.addQuotation({...form, id:uid('quo'), number:'QUO-'+(1040+state.quotations.length+1)});
    else actions.updateQuotation(editing, form);
    setEditing(null);
  };

  const list = state.quotations.filter(q => (q.number+"").toLowerCase().includes(search.toLowerCase()));
  const custProjects = state.projects.filter(p=>p.customerId===form.customerId);

  if (detailId) {
    const q = state.quotations.find(x=>x.id===detailId);
    if(!q){ setDetailId(null); return null; }
    const cust = state.customers.find(c=>c.id===q.customerId);
    const proj = state.projects.find(p=>p.id===q.projectId);
    const {sub, afterDiscount, vatAmt, total} = calcDocTotal(q.items,q.discount,q.vat);
    return (
      <div>
        <div className="back-link" onClick={()=>setDetailId(null)}><Icon d={ICONS.chevronLeft} size={15}/> Back to quotations</div>
        <div className="detail-header">
          <div className="detail-title"><h2 className="mono">{q.number}</h2>
            <div className="detail-meta"><span>{cust?.name}</span><span>{proj?.name||"No project linked"}</span><StatusPill status={q.status}/></div>
          </div>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-ghost" onClick={()=>setPrinting(q)}><Icon d={ICONS.print} size={14}/> PDF Preview</button>
            <button className="btn btn-ghost" onClick={()=>openEdit(q)}><Icon d={ICONS.edit} size={14}/> Edit</button>
            {q.status!=='Converted' && <button className="btn btn-primary" style={{'--accent':'var(--c-invoices)'}} onClick={()=>{
              const inv = {id:uid('inv'), number:'INV-'+(2200+state.invoices.length+1), customerId:q.customerId, projectId:q.projectId, quotationId:q.id, items:q.items, discount:q.discount, vat:q.vat, status:'Unpaid', createdAt:todayISO(), dueDate:todayISO(), payments:[]};
              actions.addInvoice(inv);
              actions.updateQuotation(q.id,{status:'Converted'});
              navigate('invoices',{detailId:inv.id});
            }}>Convert to Invoice</button>}
            <button className="btn btn-danger" onClick={()=>{ if(confirm('Delete this quotation?')){ actions.deleteQuotation(q.id); setDetailId(null);} }}><Icon d={ICONS.trash} size={14}/></button>
          </div>
        </div>
        <div className="card card-pad">
          <table><thead><tr><th>Description</th><th>Type</th><th>Qty</th><th>Unit Price</th><th>Line Total</th></tr></thead>
          <tbody>{q.items.map(i=><tr key={i.id}><td>{i.desc}</td><td>{i.type}</td><td>{i.qty}</td><td>{money(i.unitPrice)}</td><td>{money(i.qty*i.unitPrice)}</td></tr>)}</tbody></table>
          <div style={{maxWidth:280, marginLeft:'auto', marginTop:16, fontSize:13.5, display:'flex', flexDirection:'column', gap:6}}>
            <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'var(--muted)'}}>Subtotal</span><span>{money(sub)}</span></div>
            <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'var(--muted)'}}>Discount ({q.discount}%)</span><span>-{money(sub-afterDiscount)}</span></div>
            <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'var(--muted)'}}>VAT ({q.vat}%)</span><span>{money(vatAmt)}</span></div>
            <div style={{display:'flex', justifyContent:'space-between', fontWeight:700, fontSize:16, borderTop:'1px solid var(--line)', paddingTop:8}}><span>Total</span><span>{money(total)}</span></div>
          </div>
          {q.notes && <div style={{marginTop:16, fontSize:13, color:'var(--muted)'}}><b>Notes:</b> {q.notes}</div>}
        </div>
        {editing && (
          <Modal title="Edit Quotation" wide onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Quotation"/>}>
            <QuotationForm form={form} setForm={setForm} state={state} custProjects={state.projects.filter(p=>p.customerId===form.customerId)}/>
          </Modal>
        )}
        {printing && <PrintPreview doc={printing} type="Quotation" customer={state.customers.find(c=>c.id===printing.customerId)} onClose={()=>setPrinting(null)}/>}
      </div>
    );
  }

  return (
    <div>
      <Toolbar search={search} setSearch={setSearch} placeholder="Search quotations..." right={
        <button className="btn btn-primary" style={{'--accent':'var(--c-quotations)'}} onClick={openNew}><Icon d={ICONS.plus} size={14}/> New Quotation</button>
      }/>
      <div className="card">
        {list.length===0 ? <EmptyState icon="📝" title="No quotations yet" sub="Create your first quotation."/> :
        <table>
          <thead><tr><th>Number</th><th>Customer</th><th>Project</th><th>Total</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {list.map(q=>{
              const cust = state.customers.find(c=>c.id===q.customerId);
              const proj = state.projects.find(p=>p.id===q.projectId);
              const {total} = calcDocTotal(q.items,q.discount,q.vat);
              return (
                <tr key={q.id} className="clickable" onClick={()=>setDetailId(q.id)}>
                  <td className="mono" style={{fontWeight:600}}>{q.number}</td>
                  <td>{cust?.name||"—"}</td><td>{proj?.name||"—"}</td><td>{money(total)}</td>
                  <td><StatusPill status={q.status}/></td>

                  </td>
                </tr>

            })}
          </tbody>
        </table>}
      </div>
      {editing && (
        <Modal title={editing==='new'?"New Quotation":"Edit Quotation"} wide onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Quotation"/>}>
          <QuotationForm form={form} setForm={setForm} state={state} custProjects={custProjects}/>
        </Modal>
      )}
    </div>
  );
}

/* ============================= INVOICES ============================= */
function Invoices({navigate, params}) {
  const {state, actions} = useApp();
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [detailId, setDetailId] = useState(params?.detailId || null);
  const [payModal, setPayModal] = useState(null);
  const [payForm, setPayForm] = useState({amount:"", date:todayISO(), method:"EFT"});
  const [printing, setPrinting] = useState(null);

  useEffect(()=>{ if(params?.openNew) openNew(); if(params?.detailId) setDetailId(params.detailId); }, [params]);

  const openNew = () => { setForm({status:'Unpaid', discount:0, vat:15, items:[{id:uid('li'),desc:'',type:'Labour',qty:1,unitPrice:0}], createdAt:todayISO(), dueDate:todayISO(), payments:[]}); setEditing('new'); };
  const openEdit = (inv) => { setForm(inv); setEditing(inv.id); };
  const save = () => {
    if(!form.customerId){ alert("Please select a customer."); return; }
    if(editing==='new') actions.addInvoice({...form, id:uid('inv'), number:'INV-'+(2200+state.invoices.length+1), payments:form.payments||[]});
    else actions.updateInvoice(editing, form);
    setEditing(null);
  };

  const list = state.invoices.filter(i => (i.number+"").toLowerCase().includes(search.toLowerCase()));

  const recordPayment = () => {
    if(!payForm.amount || Number(payForm.amount)<=0){ alert("Enter a valid amount."); return; }
    actions.recordPayment(payModal.id, {id:uid('pay'), amount:Number(payForm.amount), date:payForm.date, method:payForm.method});
    setPayModal(null); setPayForm({amount:"", date:todayISO(), method:"EFT"});
  };

  if (detailId) {
    const inv = state.invoices.find(x=>x.id===detailId);
    if(!inv){ setDetailId(null); return null; }
    const cust = state.customers.find(c=>c.id===inv.customerId);
    const proj = state.projects.find(p=>p.id===inv.projectId);
    const {sub, afterDiscount, vatAmt, total} = calcDocTotal(inv.items, inv.discount, inv.vat);
    const paid = invoicePaid(inv); const balance = Math.max(0,total-paid);
    return (
      <div>
        <div className="back-link" onClick={()=>setDetailId(null)}><Icon d={ICONS.chevronLeft} size={15}/> Back to invoices</div>
        <div className="detail-header">
          <div className="detail-title"><h2 className="mono">{inv.number}</h2>
            <div className="detail-meta"><span>{cust?.name}</span><span>{proj?.name||"No project"}</span><span>Due {fmtDate(inv.dueDate)}</span><StatusPill status={inv.status}/></div>
          </div>
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-ghost" onClick={()=>setPrinting(inv)}><Icon d={ICONS.print} size={14}/> PDF Preview</button>
            <button className="btn btn-ghost" onClick={()=>openEdit(inv)}><Icon d={ICONS.edit} size={14}/> Edit</button>
            {balance>0 && <button className="btn btn-primary" style={{'--accent':'var(--c-invoices)'}} onClick={()=>setPayModal(inv)}>Record Payment</button>}
            <button className="btn btn-danger" onClick={()=>{ if(confirm('Delete this invoice?')){ actions.deleteInvoice(inv.id); setDetailId(null);} }}><Icon d={ICONS.trash} size={14}/></button>
          </div>
        </div>
        <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
          <div className="kpi" style={{'--accent':'var(--c-invoices)'}}><div className="label">Total</div><div className="value">{money(total)}</div></div>
          <div className="kpi" style={{'--accent':'var(--c-finance)'}}><div className="label">Paid</div><div className="value">{money(paid)}</div></div>
          <div className="kpi" style={{'--accent':'var(--c-calendar)'}}><div className="label">Balance</div><div className="value">{money(balance)}</div></div>
        </div>
        <div className="section-grid">
          <div className="dash-block">
            <h3>Line Items</h3>
            <table><thead><tr><th>Description</th><th>Type</th><th>Qty</th><th>Price</th><th>Line Total</th></tr></thead>
            <tbody>{inv.items.map(i=><tr key={i.id}><td>{i.desc}</td><td>{i.type}</td><td>{i.qty}</td><td>{money(i.unitPrice)}</td><td>{money(i.qty*i.unitPrice)}</td></tr>)}</tbody></table>
          </div>
          <div className="dash-block">
            <h3>Payment History</h3>
            {(inv.payments||[]).length===0 ? <EmptyState icon="💳" title="No payments recorded" sub="Record a payment to update the balance."/> :
            inv.payments.map(p=>(
              <div key={p.id} style={{display:'flex', justifyContent:'space-between', fontSize:13, padding:'8px 0', borderBottom:'1px solid #EEF1F5'}}>
                <span>{fmtDate(p.date)} · {p.method}</span><span style={{fontWeight:600}}>{money(p.amount)}</span>
              </div>
            ))}
          </div>
        </div>
        {payModal && (
          <Modal title={`Record Payment — ${payModal.number}`} onClose={()=>setPayModal(null)} footer={<ConfirmFooter onCancel={()=>setPayModal(null)} onConfirm={recordPayment} confirmLabel="Record Payment"/>}>
            <div className="form-grid">
              <Field label="Amount (R)"><input type="number" value={payForm.amount} onChange={e=>setPayForm({...payForm,amount:e.target.value})}/></Field>
              <Field label="Date"><input type="date" value={payForm.date} onChange={e=>setPayForm({...payForm,date:e.target.value})}/></Field>
              <Field label="Method" full><select value={payForm.method} onChange={e=>setPayForm({...payForm,method:e.target.value})}>
                <option>EFT</option><option>Cash</option><option>Card</option><option>Cheque</option>
              </select></Field>
            </div>
          </Modal>
        )}
        {editing && (
          <Modal title="Edit Invoice" wide onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Invoice"/>}>
            <InvoiceForm form={form} setForm={setForm} state={state}/>
          </Modal>
        )}
        {printing && <PrintPreview doc={printing} type="Invoice" customer={cust} onClose={()=>setPrinting(null)}/>}
      </div>
    );
  }

  return (
    <div>
      <Toolbar search={search} setSearch={setSearch} placeholder="Search invoices..." right={
        <button className="btn btn-primary" style={{'--accent':'var(--c-invoices)'}} onClick={openNew}><Icon d={ICONS.plus} size={14}/> New Invoice</button>
      }/>
      <div className="card">
        {list.length===0 ? <EmptyState icon="🧾" title="No invoices yet" sub="Create an invoice or convert a quotation."/> :
        <table>
          <thead><tr><th>Number</th><th>Customer</th><th>Total</th><th>Balance</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {list.map(i=>{
              const cust = state.customers.find(c=>c.id===i.customerId);
              const {total} = calcDocTotal(i.items,i.discount,i.vat);
              const bal = invoiceBalance(i);
              return (
                <tr key={i.id} className="clickable" onClick={()=>setDetailId(i.id)}>
                  <td className="mono" style={{fontWeight:600}}>{i.number}</td>
                  <td>{cust?.name||"—"}</td><td>{money(total)}</td>
                  <td style={{color: bal>0?'#A33B3B':'var(--charcoal)', fontWeight:600}}>{money(bal)}</td>
                  <td><StatusPill status={i.status}/></td>
                  <td onClick={e=>e.stopPropagation()} style={{textAlign:'right'}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(i)}><Icon d={ICONS.edit} size={13}/></button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>}
      </div>
      {editing && (
        <Modal title={editing==='new'?"New Invoice":"Edit Invoice"} wide onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Invoice"/>}>
          <InvoiceForm form={form} setForm={setForm} state={state}/>
        </Modal>
      )}
    </div>
  );
}

/* ============================= FINANCE ============================= */
function Finance() {
  const {state, actions} = useApp();
  const [tab, setTab] = useState('overview');
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});

  const totalIncome = state.invoices.reduce((s,i)=>s+invoicePaid(i),0);
  const totalExpenses = state.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const cashflow = totalIncome-totalExpenses;
  const outstanding = state.invoices.reduce((s,i)=>s+invoiceBalance(i),0);
  const totalDeposits = state.invoices.flatMap(i=>i.payments||[]).length;

  const byCategory = {};
  state.expenses.forEach(e=>{ byCategory[e.category]=(byCategory[e.category]||0)+Number(e.amount); });

  const openNew = () => { setForm({date:todayISO(), category:'Materials'}); setEditing('new'); };
  const save = () => {
    if(!form.description || !form.amount){ alert("Description and amount are required."); return; }
    if(editing==='new') actions.addExpense({...form, id:uid('exp'), amount:Number(form.amount)});
    else actions.updateExpense(editing, {...form, amount:Number(form.amount)});
    setEditing(null);
  };

  return (
    <div>
      <div className="kpi-grid">
        <div className="kpi" style={{'--accent':'var(--c-finance)'}}><div className="label">Income</div><div className="value">{money(totalIncome)}</div></div>
        <div className="kpi" style={{'--accent':'var(--c-materials)'}}><div className="label">Expenses</div><div className="value">{money(totalExpenses)}</div></div>
        <div className="kpi" style={{'--accent': cashflow>=0?'var(--c-invoices)':'var(--c-calendar)'}}><div className="label">Profit</div><div className="value">{money(cashflow)}</div></div>
        <div className="kpi" style={{'--accent':'var(--c-calendar)'}}><div className="label">Outstanding</div><div className="value">{money(outstanding)}</div></div>
      </div>

      <div className="tabs" style={{'--accent':'var(--c-finance)'}}>
        {['overview','income','expenses'].map(t=>(
          <div key={t} className={"tab"+(tab===t?" active":"")} style={{'--accent':'var(--c-finance)'}} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</div>
        ))}
      </div>

      {tab==='overview' && (
        <div className="section-grid">
          <div className="dash-block">
            <h3>Expenses by Category</h3>
            {Object.keys(byCategory).length===0 ? <EmptyState icon="📊" title="No expenses yet" sub="Log expenses to see the breakdown."/> :
            Object.entries(byCategory).map(([cat,amt])=>(
              <div key={cat} style={{marginBottom:12}}>
                <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:4}}><span>{cat}</span><span style={{fontWeight:600}}>{money(amt)}</span></div>
                <div className="progress-track"><div className="progress-fill" style={{width:Math.min(100,(amt/totalExpenses)*100)+'%', background:'var(--c-materials)'}}/></div>
              </div>
            ))}
          </div>
          <div className="dash-block">
            <h3>Financial Summary</h3>
            <div style={{display:'flex', flexDirection:'column', gap:10, fontSize:13.5}}>
              <div style={{display:'flex', justifyContent:'space-between'}}><span style={{color:'var(--muted)'}}>Total Invoiced</span><span>{money(state.invoices.reduce((s,i)=>s+calcDocTotal(i.items,i.discount,i.vat).total,0))}</span></div>

function CalendarModule() {
  const {state, actions} = useApp();
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [monthOffset, setMonthOffset] = useState(0);

  const openNew = () => { setForm({date:todayISO(), type:'Site Visit'}); setEditing('new'); };
  const save = () => {
    if(!form.title || !form.date){ alert("Title and date are required."); return; }
    if(editing==='new') actions.addCalendarEvent({...form, id:uid('cal')});
    else actions.updateCalendarEvent(editing, form);
    setEditing(null);
  };

  const now = new Date(); now.setMonth(now.getMonth()+monthOffset);
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startOffset = firstDay.getDay();
  const cells = [];
  for(let i=0;i<startOffset;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  const eventsFor = (d) => state.calendarEvents.filter(e=>{
    const ed = new Date(e.date+"T00:00:00");
    return ed.getFullYear()===year && ed.getMonth()===month && ed.getDate()===d;
  });

  const typeColor = {"Site Visit":"var(--c-projects)","Meeting":"var(--c-quotations)","Delivery":"var(--c-materials)","Deadline":"var(--c-calendar)"};

  return (
    <div>
      <div className="toolbar">
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <button className="icon-btn" style={{color:'var(--navy)'}} onClick={()=>setMonthOffset(m=>m-1)}><Icon d={ICONS.chevronLeft} size={15}/></button>
          <div style={{fontWeight:700, fontFamily:'Fraunces,serif', fontSize:17}}>{now.toLocaleDateString('en-GB',{month:'long', year:'numeric'})}</div>
          <button className="icon-btn" style={{color:'var(--navy)'}} onClick={()=>setMonthOffset(m=>m+1)}><Icon d={ICONS.chevronRight} size={15}/></button>
        </div>
        <button className="btn btn-primary" style={{'--accent':'var(--c-calendar)'}} onClick={openNew}><Icon d={ICONS.plus} size={14}/> New Event</button>
      </div>
      <div className="card card-pad">
        <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:6, marginBottom:8}}>
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={{fontSize:11, fontWeight:700, color:'var(--muted)', textAlign:'center'}}>{d}</div>)}
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:6}}>
          {cells.map((d,i)=>{
            const evs = d ? eventsFor(d) : [];
            const isToday = d && new Date().toDateString()===new Date(year,month,d).toDateString();
            return (
              <div key={i} style={{minHeight:76, borderRadius:9, border:'1px solid '+(isToday?'var(--c-calendar)':'var(--line)'), padding:6, background: d?'#fff':'transparent'}}>
                {d && <div style={{fontSize:11.5, fontWeight:700, color: isToday?'var(--c-calendar)':'var(--muted)', marginBottom:4}}>{d}</div>}
                {evs.slice(0,2).map(e=>(
                  <div key={e.id} onClick={()=>{setForm(e); setEditing(e.id);}} style={{fontSize:10, padding:'2px 5px', borderRadius:4, marginBottom:2, cursor:'pointer', background:(typeColor[e.type]||'var(--navy)')+"22", color:typeColor[e.type]||'var(--navy)', fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{e.title}</div>
                ))}
                {evs.length>2 && <div style={{fontSize:9.5, color:'var(--muted)'}}>+{evs.length-2} more</div>}
              </div>
            );
          })}
        </div>
      </div>
      <div className="dash-block" style={{marginTop:18}}>
        <h3>All Events</h3>
        <table><thead><tr><th>Title</th><th>Type</th><th>Date</th><th>Project</th><th></th></tr></thead>
        <tbody>{[...state.calendarEvents].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
          const proj = state.projects.find(p=>p.id===e.relatedProjectId);
          return <tr key={e.id}><td style={{fontWeight:600}}>{e.title}</td><td>{e.type}</td><td>{fmtDate(e.date)}</td><td>{proj?.name||"—"}</td>
          <td style={{textAlign:'right'}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setForm(e); setEditing(e.id);}}><Icon d={ICONS.edit} size={13}/></button>
            <button className="icon-btn" style={{marginLeft:6}} onClick={()=>actions.deleteCalendarEvent(e.id)}><Icon d={ICONS.trash} size={13}/></button>
          </td></tr>;
        })}</tbody></table>
      </div>
      {editing && (
        <Modal title={editing==='new'?"New Calendar Event":"Edit Event"} onClose={()=>setEditing(null)} footer={<ConfirmFooter onCancel={()=>setEditing(null)} onConfirm={save} confirmLabel="Save Event"/>}>
          <GenericForm schema={[
            {name:'title', label:'Title', full:true},
            {name:'type', label:'Type', type:'select', options:['Site Visit','Meeting','Delivery','Deadline']},
            {name:'date', label:'Date', type:'date'},
            {name:'relatedProjectId', label:'Related Project', type:'select', options:state.projects.map(p=>({value:p.id,label:p.name}))},
            {name:'notes', label:'Notes', full:true, type:'textarea'},
          ]} value={form} onChange={setForm}/>
        </Modal>
      )}
    </div>
  );
}

function App() {
  const [state, setState] = useState(seed());
  const [page, setPage] = useState('dashboard');
  const [params, setParams] = useState({});
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [toast, setToast] = useState(null);

  const notify = (msg) => setToast(msg);

  const navigate = (p, prms={}) => { setPage(p); setParams({...prms, _t:Date.now()}); setSidebarOpen(false); };

  const actions = useMemo(()=>({
    addCustomer: c => { setState(s=>({...s, customers:[...s.customers, c]})); notify("Customer added"); },
    updateCustomer: (id, patch) => setState(s=>({...s, customers:s.customers.map(c=>c.id===id?{...c,...patch}:c)})),
    deleteCustomer: id => setState(s=>({...s, customers:s.customers.filter(c=>c.id!==id)})),

    addProject: p => { setState(s=>({...s, projects:[...s.projects, p]})); notify("Project created"); },
    updateProject: (id, patch) => setState(s=>({...s, projects:s.projects.map(p=>p.id===id?{...p,...patch}:p)})),
    deleteProject: id => setState(s=>({...s, projects:s.projects.filter(p=>p.id!==id)})),

    addQuotation: q => { setState(s=>({...s, quotations:[...s.quotations, q]})); notify("Quotation created"); },
    updateQuotation: (id, patch) => setState(s=>({...s, quotations:s.quotations.map(q=>q.id===id?{...q,...patch}:q)})),
    deleteQuotation: id => setState(s=>({...s, quotations:s.quotations.filter(q=>q.id!==id)})),

    addInvoice: inv => { setState(s=>({...s, invoices:[...s.invoices, inv]})); notify("Invoice created"); },
    updateInvoice: (id, patch) => setState(s=>({...s, invoices:s.invoices.map(i=>i.id===id?{...i,...patch}:i)})),
    deleteInvoice: id => setState(s=>({...s, invoices:s.invoices.filter(i=>i.id!==id)})),
    recordPayment: (invId, payment) => {
      setState(s=>({...s, invoices:s.invoices.map(i=>{
        if(i.id!==invId) return i;
        const payments = [...(i.payments||[]), payment];
        const total = calcDocTotal(i.items, i.discount, i.vat).total;
        const paid = payments.reduce((sum,p)=>sum+Number(p.amount),0);
        const status = paid>=total ? 'Paid' : paid>0 ? 'Partially Paid' : 'Unpaid';
        return {...i, payments, status};
      })}));
      notify("Payment recorded");
    },

    addExpense: e => { setState(s=>({...s, expenses:[...s.expenses, e]})); notify("Expense logged"); },
    updateExpense: (id, patch) => setState(s=>({...s, expenses:s.expenses.map(e=>e.id===id?{...e,...patch}:e)})),
    deleteExpense: id => setState(s=>({...s, expenses:s.expenses.filter(e=>e.id!==id)})),

    addCatalogueItem: m => { setState(s=>({...s, materialsCatalogue:[...s.materialsCatalogue, m]})); notify("Material added"); },
    updateCatalogueItem: (id, patch) => setState(s=>({...s, materialsCatalogue:s.materialsCatalogue.map(m=>m.id===id?{...m,...patch}:m)})),
    deleteCatalogueItem: id => setState(s=>({...s, materialsCatalogue:s.materialsCatalogue.filter(m=>m.id!==id)})),

    addStaff: st => { setState(s=>({...s, staff:[...s.staff, st]})); notify("Staff member added"); },
    updateStaff: (id, patch) => setState(s=>({...s, staff:s.staff.map(x=>x.id===id?{...x,...patch}:x)})),
    deleteStaff: id => setState(s=>({...s, staff:s.staff.filter(x=>x.id!==id)})),

    addCalendarEvent: ev => { setState(s=>({...s, calendarEvents:[...s.calendarEvents, ev]})); notify("Event added"); },
    updateCalendarEvent: (id, patch) => setState(s=>({...s, calendarEvents:s.calendarEvents.map(e=>e.id===id?{...e,...patch}:e)})),
    deleteCalendarEvent: id => setState(s=>({...s, calendarEvents:s.calendarEvents.filter(e=>e.id!==id)})),

    addDocument: d => { setState(s=>({...s, documents:[...s.documents, d]})); notify("Document added"); },
    updateDocument: (id, patch) => setState(s=>({...s, documents:s.documents.map(d=>d.id===id?{...d,...patch}:d)})),
    deleteDocument: id => setState(s=>({...s, documents:s.documents.filter(d=>d.id!==id)})),
  }), []);

  const activeNav = NAV.find(n=>n.key===page);

  const renderPage = () => {
    switch(page){
      case 'dashboard': return <Dashboard navigate={navigate}/>;
      case 'customers': return <Customers navigate={navigate} params={params}/>;
      case 'projects': return <Projects navigate={navigate} params={params}/>;
      case 'quotations': return <Quotations navigate={navigate} params={params}/>;
      case 'invoices': return <Invoices navigate={navigate} params={params}/>;
      case 'finance': return <Finance/>;
      case 'materials': return <Materials/>;
      case 'staff': return <Staff/>;
      case 'calendar': return <CalendarModule/>;
      case 'documents': return <Documents/>;
      default: return null;
    }
  };

  return (
    <Ctx.Provider value={{state, actions}}>
      <div className="app-shell">
        <div className={"sidebar" + (sidebarOpen?" open":"")}>
          <div className="sidebar-brand">
            <div className="mark">SD</div>
            <div className="name">Smart Design<br/>Construction</div>
            <div className="sub">Operations Platform</div>
          </div>
          <div className="nav">
            {NAV.map(n=>(
              <div key={n.key} className={"nav-item"+(page===n.key?" active":"")} style={{'--dot':n.accent}} onClick={()=>navigate(n.key)}>
                <Icon d={n.icon} size={16}/> {n.label}
              </div>
            ))}
          </div>
          <div className="sidebar-foot">Phase 1 — Interactive Demo<br/>v1.0</div>
        </div>

        <div className="main">
          <div className="topbar">
            <div style={{display:'flex', alignItems:'center', gap:14}}>
              <button className="menu-btn" onClick={()=>setSidebarOpen(o=>!o)}><Icon d={ICONS.menu} size={22}/></button>
              <div>
                <h1>{activeNav.label}</h1>
                <div className="accent-bar" style={{'--accent':activeNav.accent}}></div>
              </div>
            </div>
            <div style={{fontSize:12.5, color:'var(--muted)', display:'flex', alignItems:'center', gap:8}}>
              <Icon d={ICONS.clock} size={14}/> {new Date().toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long', year:'numeric'})}
            </div>
          </div>
          <div className="content">
            {renderPage()}
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
